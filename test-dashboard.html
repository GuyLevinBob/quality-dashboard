<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Test</title>
    <script>
        // Simple test to verify the dashboard loads
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, checking dashboard file...');
            
            // Load the dashboard in an iframe to test
            const iframe = document.createElement('iframe');
            iframe.src = 'bug-dashboard-embedded.html';
            iframe.style.width = '100%';
            iframe.style.height = '600px';
            iframe.style.border = '1px solid #ccc';
            
            iframe.onload = function() {
                console.log('✅ Dashboard iframe loaded successfully');
                setTimeout(() => {
                    try {
                        const iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
                        const statusEl = iframeDoc.getElementById('status');
                        if (statusEl) {
                            const statusText = statusEl.textContent;
                            console.log('Dashboard status:', statusText);
                            
                            if (statusText.includes('✅') || statusText.includes('ready')) {
                                document.getElementById('result').innerHTML = '✅ Dashboard loaded successfully!';
                                document.getElementById('result').style.color = 'green';
                            } else if (statusText.includes('❌') || statusText.includes('Failed')) {
                                document.getElementById('result').innerHTML = '❌ Dashboard failed to load: ' + statusText;
                                document.getElementById('result').style.color = 'red';
                            } else {
                                document.getElementById('result').innerHTML = '⏳ Dashboard loading: ' + statusText;
                                document.getElementById('result').style.color = 'orange';
                            }
                        } else {
                            document.getElementById('result').innerHTML = '❓ Could not read dashboard status';
                            document.getElementById('result').style.color = 'gray';
                        }
                    } catch (e) {
                        console.error('Error accessing iframe:', e);
                        document.getElementById('result').innerHTML = '❌ Could not access dashboard content due to security restrictions';
                        document.getElementById('result').style.color = 'red';
                    }
                }, 2000);
            };
            
            iframe.onerror = function() {
                console.log('❌ Dashboard failed to load in iframe');
                document.getElementById('result').innerHTML = '❌ Dashboard failed to load';
                document.getElementById('result').style.color = 'red';
            };
            
            document.getElementById('container').appendChild(iframe);
        });
    </script>
</head>
<body>
    <h1>Dashboard Test Page</h1>
    <div id="result">⏳ Testing dashboard...</div>
    <div id="container" style="margin-top: 20px;"></div>
</body>
</html>
