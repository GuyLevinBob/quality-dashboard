name: Deploy Dashboard Updates

on:
  push:
    branches: [ main ]
    paths: 
      - 'dashboard-data.json'
      - 'dashboard-automated-fixed.html'
      - 'index.html'
      - 'bugs-cache.json'
  workflow_dispatch: # Allow manual triggering

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Verify dashboard data
      run: |
        echo "📊 Verifying dashboard data file..."
        if [ -f "dashboard-data.json" ]; then
          echo "✅ Dashboard data file exists"
          wc -l dashboard-data.json
          echo "📈 Data file ready for deployment"
        else
          echo "❌ Dashboard data file not found"
          exit 1
        fi
        
    - name: Deploy notification
      run: |
        echo "🚀 Dashboard deployment triggered by dashboard updates"
        echo "📊 GitHub Pages will automatically serve updated dashboard"
        echo "🌐 Team dashboard URLs:"
        echo "   - Main: https://guylevinbob.github.io/quality-dashboard/"
        echo "   - Direct: https://guylevinbob.github.io/quality-dashboard/dashboard-automated-fixed.html"
        echo "✅ Latest changes now live on GitHub Pages"