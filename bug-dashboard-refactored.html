        <div id="bugModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title">ISSUE DETAILS</h1>
                    <div class="modal-subtitle">Complete tracking and status overview</div>
                    <button class="close-btn" id="closeModalBtn">&times;</button>
                </div>

        <div class="cache-info" id="cacheInfo" title="Click for cache details">
            Cache: Loading...

    <script>
        // Global state - keep original filter management but with new data manager
        let dataManager;
        let bugsData = [];
        let filteredData = [];
        let currentSort = { column: null, direction: 'asc' };
        
        // Global filter selections (same as original)
        const filterSelections = {
            status: new Set(),
            severity: new Set(),
            assignee: new Set(),
            leadingTeam: new Set(),
            system: new Set(),
            sprint: new Set(),
            regression: new Set()
        };

        // Initialize the application with refactored architecture
        async function initializeApp() {
            try {
                console.log('🚀 Initializing refactored bug dashboard...');
                
                // Create data manager instance
                dataManager = new BugDataManager({
                    apiBaseUrl: 'http://localhost:3002',
                    pageSize: 1000 // Load all for original UI behavior
                });
                
                // Set up event listeners
                dataManager.onDataChanged(handleDataChanged);
                dataManager.onError(handleError);
                
                // Set up UI event listeners (original style)
                setupEventListeners();
                
                // Initialize data (loads from cache first, syncs in background)
                await dataManager.initialize();
                
            } catch (error) {
                console.error('❌ Failed to initialize app:', error);
                document.getElementById('status').innerHTML = '<span class="error">❌ Failed to initialize: ' + error.message + '</span>';
            }
        }

        // Handle data changes from the data manager
        function handleDataChanged(type, state) {
            console.log(`📊 Data changed: ${type}`);
            
            switch (type) {
                case 'cache-loaded':
                    document.getElementById('status').innerHTML = '<span class="success">✅ Loaded from cache - syncing in background...</span>';
                    updateUIWithNewData(state);
                    break;
                case 'syncing':
                    document.getElementById('status').innerHTML = '<span class="loading">🔄 Syncing with Jira...</span>';
                    break;
                case 'sync-complete':
                    document.getElementById('status').innerHTML = `<span class="success">✅ Loaded ${state.allBugs.length} bugs from Jira</span>`;
                    updateUIWithNewData(state);
                    break;
                case 'background-sync-complete':
                    document.getElementById('status').innerHTML = `<span class="success">✅ Updated with latest data (${state.allBugs.length} bugs)</span>`;
                    updateUIWithNewData(state);
                    break;
                case 'ready':
                    document.getElementById('status').innerHTML = `<span class="success">✅ Dashboard ready (${state.allBugs.length} bugs cached)</span>`;
                    break;
            }
            
            updateCacheInfo();
        }

        // Update UI with new data (convert to original format)
        function updateUIWithNewData(state) {
            console.log('📊 Raw data received from manager:', {
                bugCount: state.allBugs.length,
                firstBug: state.allBugs[0],
                sampleFields: state.allBugs.slice(0,3).map(b => ({
                    key: b.key,
                    leadingTeam: b.leadingTeam,
                    system: b.system,
                    sprint: b.sprintName || b.sprint,
                    regression: b.regression
                }))
            });
            
            // Convert new format to original bugsData format
            bugsData = state.allBugs.map(bug => ({
                key: bug.key,
                project: bug.project || 'BT',
                summary: bug.summary,
                status: bug.status,
                priority: bug.priority,
                severity: bug.priority, // Use priority as severity
                assignee: bug.assignee,
                reporter: bug.reporter || 'Unknown',
                created: bug.created,
                updated: bug.updated,
                createdDate: bug.createdDate,
                updatedDate: bug.updatedDate,
                daysOpen: bug.daysOpen,
                // Use actual data first, then fallback to extraction methods
                leadingTeam: bug.leadingTeam || bug.team || extractTeamFromLabels(bug) || 'No Data',
                system: bug.system || bug.component || extractSystemFromLabels(bug) || 'No Data',
                sprint: bug.sprintName || bug.sprint || extractSprintFromLabels(bug) || 'No Data',
                regression: bug.regression || extractRegressionFromLabels(bug) || 'No Data',
                involvedTeams: bug.involvedTeams || [],
                sprintId: bug.sprintId,
                bugType: bug.bugType,
                labels: bug.labels || [],
                components: bug.components || [],
                isOpen: bug.isOpen
            }));
            
            console.log('📊 Converted bugsData for UI:', {
                bugCount: bugsData.length,
                uniqueLeadingTeams: [...new Set(bugsData.map(b => b.leadingTeam).filter(t => t && t !== 'No Data'))],
                uniqueSystems: [...new Set(bugsData.map(b => b.system).filter(s => s && s !== 'No Data'))],
                uniqueSprints: [...new Set(bugsData.map(b => b.sprint).filter(s => s && s !== 'No Data'))],
                uniqueRegression: [...new Set(bugsData.map(b => b.regression).filter(r => r && r !== 'No Data'))]
            });
            
            // Now populate the UI
            restoreFilterState(); // Restores filterSelections and currentSort
            displayStats();
            createCharts();
            populateFilters(); // Populates multi-select dropdowns
            applyFilters(); // Applies filters/sort, calls displayBugsTable()
            document.getElementById('dashboard-content').style.display = 'block';
        }

        // Helper functions to extract data from bug labels or other fields
        function extractTeamFromLabels(bug) {
            if (bug.labels && Array.isArray(bug.labels)) {
                const teamLabel = bug.labels.find(label => 
                    label.toLowerCase().includes('team-') || 
                    label.toLowerCase().includes('squad-') ||
                    ['AI Dev', 'MIS - GTC', 'Dealhub', 'Workato', 'MIS - CORP', 'SFDC', 'ZIP', 'Netwise'].includes(label)
                );
                if (teamLabel) return teamLabel.replace('team-', '').replace('squad-', '');
            }
            
            // Try to extract from component names
            if (bug.components && Array.isArray(bug.components)) {
                const component = bug.components[0];
                if (component && component.name) {
                    return component.name;
                }
            }
            
            return null;
        }

        function extractSystemFromLabels(bug) {
            if (bug.labels && Array.isArray(bug.labels)) {
                const systemLabel = bug.labels.find(label => 
                    ['Other', 'Dealhub', 'Workato', 'Stripe', 'SFDC', 'ZIP', 'Netwise'].includes(label)
                );
                if (systemLabel) return systemLabel;
            }
            
            // Try to extract from components
            if (bug.components && Array.isArray(bug.components)) {
                const component = bug.components[0];
                if (component && component.name) {
                    return component.name;
                }
            }
            
            return null;
        }

        function extractSprintFromLabels(bug) {
            if (bug.labels && Array.isArray(bug.labels)) {
                const sprintLabel = bug.labels.find(label => 
                    label.toLowerCase().includes('sprint') || 
                    label.toLowerCase().includes('pi3.2')
                );
                if (sprintLabel) return sprintLabel;
            }
            
            // Try to extract from sprint field
            if (bug.fields && bug.fields.sprint) {
                return bug.fields.sprint.name || bug.fields.sprint;
            }
            
            return null;
        }

        function extractRegressionFromLabels(bug) {
            if (bug.labels && Array.isArray(bug.labels)) {
                const hasRegression = bug.labels.some(label => 
                    label.toLowerCase().includes('regression') || 
                    label.toLowerCase().includes('regress')
                );
                return hasRegression ? 'Yes' : 'No';
            }
            
            return null;
        }

        // Handle errors from the data manager
        function handleError(message, error) {
            console.error('❌ Data manager error:', message, error);
            document.getElementById('status').innerHTML = '<span class="warning">⚠️ API unavailable, loading from local data...</span>';
            // Try loading local data as fallback
            loadLocalData();
        }
        
        // Fallback function to load jira-bugs-data.json directly
        async function loadLocalData() {
            try {
                console.log('📊 Loading local jira-bugs-data.json...');
                const response = await fetch('./jira-bugs-data.json');
                if (!response.ok) throw new Error('Failed to load local data file');
                
                const localBugs = await response.json();
                console.log('📊 Loaded local bugs:', localBugs.length);
                
                // Simulate the data manager state format
                const state = {
                    allBugs: localBugs.map(bug => ({
                        id: bug.key,
                        key: bug.key,
                        project: bug.project || 'BT',
                        summary: bug.summary,
                        status: bug.status,
                        priority: bug.priority,
                        assignee: bug.assignee,
                        reporter: bug.reporter,
                        created: bug.created,
                        updated: bug.updated,
                        createdDate: bug.createdDate,
                        updatedDate: bug.updatedDate,
                        daysOpen: bug.daysOpen,
                        leadingTeam: bug.leadingTeam,
                        system: bug.system,
                        sprintName: bug.sprint,
                        sprint: bug.sprint,
                        sprintId: bug.sprintId,
                        severity: bug.severity,
                        bugType: bug.bugType,
                        regression: bug.regression,
                        labels: bug.labels || [],
                        components: bug.components || [],
                        involvedTeams: bug.involvedTeams || [],
                        isOpen: bug.status !== 'Deployed' && bug.status !== 'Canceled'
                    }))
                };
                
                updateUIWithNewData(state);
                document.getElementById('status').innerHTML = `<span class="success">✅ Loaded ${localBugs.length} bugs from local data</span>`;
                
            } catch (error) {
                console.error('❌ Failed to load local data:', error);
                document.getElementById('status').innerHTML = `<span class="error">❌ Failed to load data: ${error.message}</span>`;
            }
        }

        // Original display stats function
        function displayStats() {
            const stats = calculateStats(bugsData);
            document.getElementById('totalBugs').textContent = stats.totalBugs;
            document.getElementById('highPriorityBugs').textContent = stats.highPriority || 0;
            document.getElementById('deployedBugs').textContent = stats.deployed || 0;
            document.getElementById('avgDaysOpen').textContent = stats.avgDaysOpen;
        }

        // Calculate statistics from data
        function calculateStats(bugs) {
            const totalBugs = bugs.length;
            const highPriority = bugs.filter(b => b.priority === 'High').length;
            const deployed = bugs.filter(b => b.status === 'Deployed').length;
            const avgDaysOpen = Math.round(bugs.reduce((sum, b) => sum + (b.daysOpen || 0), 0) / totalBugs) || 0;
            
            return { totalBugs, highPriority, deployed, avgDaysOpen };
        }

        // Create charts (simplified version)
        function createCharts() {
            createStatusChart();
            createPriorityChart();
            createAssigneeChart();
        }

        function createStatusChart() {
            const statusCounts = {};
            bugsData.forEach(bug => {
                statusCounts[bug.status] = (statusCounts[bug.status] || 0) + 1;
            });
            
            const chartContainer = document.getElementById('statusChart');
            chartContainer.innerHTML = '';
            
            Object.entries(statusCounts).forEach(([status, count]) => {
                const item = document.createElement('div');
                item.className = 'chart-item ' + getStatusClass(status);
                item.innerHTML = `
                    <span class="chart-label">${status}</span>
                    <span class="chart-value">${count}</span>
                `;
                chartContainer.appendChild(item);
            });
        }

        function createPriorityChart() {
            const priorityCounts = {};
            bugsData.forEach(bug => {
                const priority = bug.priority || 'Unknown';
                priorityCounts[priority] = (priorityCounts[priority] || 0) + 1;
            });
            
            const chartContainer = document.getElementById('priorityChart');
            chartContainer.innerHTML = '';
            
            Object.entries(priorityCounts).forEach(([priority, count]) => {
                const item = document.createElement('div');
                item.className = 'chart-item ' + priority.toLowerCase();
                item.innerHTML = `
                    <span class="chart-label">${priority} Priority</span>
                    <span class="chart-value">${count}</span>
                `;
                chartContainer.appendChild(item);
            });
        }

        function createAssigneeChart() {
            const assigneeCounts = {};
            bugsData.forEach(bug => {
                const assignee = bug.assignee || 'Unassigned';
                assigneeCounts[assignee] = (assigneeCounts[assignee] || 0) + 1;
            });
            
            const chartContainer = document.getElementById('assigneeChart');
            chartContainer.innerHTML = '';
            
            // Show top 5 assignees
            const topAssignees = Object.entries(assigneeCounts)
                .sort(([,a], [,b]) => b - a)
                .slice(0, 5);
            
            topAssignees.forEach(([assignee, count]) => {
                const item = document.createElement('div');
                item.className = 'chart-item';
                item.innerHTML = `
                    <span class="chart-label">${assignee}</span>
                    <span class="chart-value">${count}</span>
                `;
                chartContainer.appendChild(item);
            });
        }

        // Original populate filters function (with multi-select)
        function populateFilters() {
            console.log('🔧 Populating filters...');
            const filterTypes = ['status', 'severity', 'assignee', 'leadingTeam', 'system', 'sprint', 'regression'];
            
            filterTypes.forEach(filterType => {
                let values = [...new Set(bugsData.map(bug => bug[filterType]).filter(v => {
                    // Filter out null, undefined, empty strings, and "No Data"
                    return v && 
                           v !== 'No Data' && 
                           v !== 'Unassigned' && 
                           v !== 'Other' && 
                           v !== 'Backlog' && 
                           v.toString().trim().length > 0;
                }))].sort();
                
                // Add back some default values for certain filters if no data found
                if (values.length === 0) {
                    switch (filterType) {
                        case 'leadingTeam':
                            values = ['AI Dev', 'MIS - GTC', 'MIS - CORP', 'Dealhub', 'Workato', 'SFDC', 'ZIP'];
                            break;
                        case 'system':
                            values = ['Dealhub', 'Workato', 'Stripe', 'SFDC', 'ZIP', 'Netwise', 'Other'];
                            break;
                        case 'sprint':
                            values = ['PI3.2 Sprint 1', 'PI3.2 Sprint 2', 'PI3.2 Sprint 3', 'Backlog'];
                            break;
                        case 'regression':
                            values = ['Yes', 'No'];
                            break;
                    }
                }
                
                console.log(`📋 Filter ${filterType}: ${values.length} options:`, values.slice(0, 3));
                populateMultiSelect(filterType, values);
            });
        }

        // Original multi-select population (same as original)
        function populateMultiSelect(filterType, options) {
            const dropdown = document.getElementById(`${filterType}FilterDropdown`);
            const button = document.getElementById(`${filterType}FilterButton`);
            
            dropdown.innerHTML = '';
            
            options.forEach(option => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'multiselect-option';
                optionDiv.innerHTML = `
                    <input type="checkbox" id="${filterType}_${option}" value="${option}">
                    <label for="${filterType}_${option}">${option}</label>
                `;

                const checkbox = optionDiv.querySelector('input');
                checkbox.addEventListener('change', () => {
                    if (checkbox.checked) {
                        filterSelections[filterType].add(option);
                    } else {
                        filterSelections[filterType].delete(option);
                    }
                    updateFilterButtonText(filterType);
                    applyFilters();
                    saveFilterState(); // Save state when filters change
                });
                
                dropdown.appendChild(optionDiv);
            });

            // Add button click handler
            button.addEventListener('click', (e) => {
                e.preventDefault();
                e.stopPropagation();

                const isOpen = dropdown.classList.contains('show');

                // Close all dropdowns first
                document.querySelectorAll('.multiselect-dropdown').forEach(d => d.classList.remove('show'));

                if (!isOpen) {
                    dropdown.classList.add('show');
                }
            });
        }

        // Original filter button text update
        function updateFilterButtonText(filterType) {
            const button = document.getElementById(`${filterType}FilterButton`).querySelector('span');
            const selections = filterSelections[filterType];

            if (selections.size === 0) {
                button.textContent = 'Choose a Value';
            } else if (selections.size === 1) {
                button.textContent = Array.from(selections)[0];
            } else {
                button.textContent = `${selections.size} selected`;
            }
        }

        // Close dropdowns when clicking outside
        document.addEventListener('click', () => {
            document.querySelectorAll('.multiselect-dropdown').forEach(dropdown => {
                dropdown.classList.remove('show');
            });
        });

        // Original filtering function (same as original)
        function applyFilters() {
            const searchFilter = document.getElementById('searchFilter').value.toLowerCase();

            filteredData = bugsData.filter(bug => {
                const statusMatch = filterSelections.status.size === 0 || filterSelections.status.has(bug.status);
                const severityMatch = filterSelections.severity.size === 0 || filterSelections.severity.has(bug.severity);
                const assigneeMatch = filterSelections.assignee.size === 0 || filterSelections.assignee.has(bug.assignee);
                const leadingTeamMatch = filterSelections.leadingTeam.size === 0 || filterSelections.leadingTeam.has(bug.leadingTeam);
                const systemMatch = filterSelections.system.size === 0 || filterSelections.system.has(bug.system);
                const sprintMatch = filterSelections.sprint.size === 0 || filterSelections.sprint.has(bug.sprint);
                const regressionMatch = filterSelections.regression.size === 0 || filterSelections.regression.has(bug.regression);
                const searchMatch = !searchFilter ||
                                  (bug.summary && bug.summary.toLowerCase().includes(searchFilter)) ||
                                  (bug.key && bug.key.toLowerCase().includes(searchFilter)) ||
                                  (bug.assignee && bug.assignee.toLowerCase().includes(searchFilter));

                return statusMatch && severityMatch && assigneeMatch &&
                       leadingTeamMatch && systemMatch && sprintMatch && regressionMatch && searchMatch;
            });

            applySorting();
            displayBugsTable();
        }

        // Original sorting function
        function applySorting() {
            if (!currentSort.column) return;
            
            filteredData.sort((a, b) => {
                let aVal = a[currentSort.column];
                let bVal = b[currentSort.column];
                
                if (aVal == null) aVal = '';
                if (bVal == null) bVal = '';
                
                aVal = String(aVal);
                bVal = String(bVal);
                
                const comparison = aVal.localeCompare(bVal, undefined, { numeric: true });
                return currentSort.direction === 'asc' ? comparison : -comparison;
            });
        }

        // Original table display function
        function displayBugsTable() {
            const tbody = document.getElementById('bugsTableBody');
            tbody.innerHTML = '';

            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="11" style="text-align: center; padding: 40px;">No bugs found matching current filters</td></tr>';
                return;
            }

            // Show all results (original behavior)
            filteredData.forEach(bug => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><a href="#" class="bug-key" onclick="showBugDetails('${bug.key}')">${bug.key}</a></td>
                    <td>${escapeHtml(bug.summary || '')}</td>
                    <td><span class="status-badge ${getStatusClass(bug.status)}">${bug.status}</span></td>
                    <td><span class="priority-${bug.priority.toLowerCase()}">${bug.priority}</span></td>
                    <td>${bug.assignee || 'Unassigned'}</td>
                    <td>${bug.leadingTeam || 'No Data'}</td>
                    <td>${bug.system || 'No Data'}</td>
                    <td>${bug.sprint || 'No Data'}</td>
                    <td>${bug.regression || 'No Data'}</td>
                    <td>${bug.daysOpen || 0} days</td>
                    <td>${bug.createdDate}</td>
                `;
                tbody.appendChild(row);
            });

            // Update sort indicators
            updateSortIndicators();
        }

        // Update sort indicators
        function updateSortIndicators() {
            document.querySelectorAll('th[data-column]').forEach(th => {
                th.classList.remove('sorted', 'asc', 'desc');
            });
            
            if (currentSort.column) {
                const th = document.querySelector(`th[data-column="${currentSort.column}"]`);
                if (th) {
                    th.classList.add('sorted', currentSort.direction);
                }
            }
        }

        // Helper functions
        function getStatusClass(status) {
            if (!status) return 'status-unknown';
            return 'status-' + status.toLowerCase().replace(/\s+/g, '-');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Clear all filters (original function)
        function clearAllFilters() {
            Object.keys(filterSelections).forEach(filterType => {
                filterSelections[filterType].clear();
            });
            
            Object.keys(filterSelections).forEach(filterType => {
                updateFilterButtonText(filterType);
            });
            
            document.querySelectorAll('.multiselect-option input[type="checkbox"]').forEach(checkbox => {
                checkbox.checked = false;
            });

            document.getElementById('searchFilter').value = '';
            applyFilters();
            saveFilterState(); // Save cleared state
        }

        // Save filter state to cache
        function saveFilterState() {
            if (!dataManager) return;
            
            const filterState = {};
            Object.keys(filterSelections).forEach(key => {
                filterState[key] = Array.from(filterSelections[key]);
            });
            filterState.search = document.getElementById('searchFilter').value;
            
            dataManager.cache.saveFilterState(filterState, currentSort);
        }

        // Restore filter state from cache
        function restoreFilterState() {
            if (!dataManager) return;
            
            const saved = dataManager.cache.restoreFilterState();
            if (!saved || !saved.filters) return;

            // Restore filter selections
            Object.keys(saved.filters).forEach(key => {
                if (key === 'search') {
                    document.getElementById('searchFilter').value = saved.filters[key] || '';
                } else {
                    filterSelections[key] = new Set(saved.filters[key] || []);
                }
            });

            // Restore sort state
            if (saved.sort) {
                currentSort = { ...currentSort, ...saved.sort };
            }

            // Update UI to reflect restored state
            setTimeout(() => {
                Object.keys(filterSelections).forEach(filterType => {
                    updateFilterButtonText(filterType);
                    
                    // Update checkboxes
                    filterSelections[filterType].forEach(value => {
                        const checkbox = document.getElementById(`${filterType}_${value}`);
                        if (checkbox) checkbox.checked = true;
                    });
                });
            }, 100);
        }

        // Show bug details in modal
        async function showBugDetails(bugKey) {
            const modal = document.getElementById('bugModal');
            const modalContent = document.getElementById('modalContent');
            
            // Find the bug in our current data for basic info
            const bug = bugsData.find(b => b.key === bugKey);
            
            modalContent.innerHTML = '<div style="text-align: center; padding: 40px; color: #3A3A37;">Loading bug details...</div>';
            modal.style.display = 'block';
            
            try {
                const details = await dataManager.getBugDetails(bugKey);
                modalContent.innerHTML = `
                    <div class="modal-field">
                        <h3>Basic Information</h3>
                        <div class="modal-field-content">
                            <strong>Issue Key:</strong> ${bugKey}<br>
                            <strong>Status:</strong> <span class="status-badge ${getStatusClass(bug?.status)}">${bug?.status || 'Unknown'}</span><br>
                            <strong>Priority:</strong> <span class="priority-badge ${getPriorityClass(bug?.priority)}">${bug?.priority || 'Unknown'}</span><br>
                            <strong>Assignee:</strong> ${bug?.assignee || 'Unassigned'}<br>
                            <strong>Leading Team:</strong> ${bug?.leadingTeam || 'No Data'}<br>
                            <strong>System:</strong> ${bug?.system || 'No Data'}<br>
                            <strong>Sprint:</strong> ${bug?.sprint || 'No Data'}<br>
                            <strong>Regression:</strong> ${bug?.regression || 'No Data'}
                        </div>
                    </div>
                    
                    <div class="modal-field">
                        <h3>Summary</h3>
                        <div class="modal-field-content">
                            ${escapeHtml(bug?.summary || 'No summary available.')}
                        </div>
                    </div>
                    
                    <div class="modal-field">
                        <h3>Description</h3>
                        <div class="modal-field-content">
                            ${escapeHtml(details.description || 'No description available.')}
                        </div>
                    </div>
                `;
            } catch (error) {
                modalContent.innerHTML = `
                    <div class="modal-field">
                        <h3>Error</h3>
                        <div style="color: #EE164F; padding: 24px; background: linear-gradient(135deg, #FEABB0 0%, #FFFFFF 100%); border-radius: 16px; border: 1px solid rgba(238, 22, 79, 0.2);">
                            Failed to load bug details: ${error.message}
                        </div>
                    </div>
                `;
            }
        }

        // Close bug details modal
        function closeBugDetails() {
            document.getElementById('bugModal').style.display = 'none';
        }

        // Update cache info display
        function updateCacheInfo() {
            if (!dataManager) return;
            
            const info = dataManager.getCacheInfo();
            const cacheInfo = document.getElementById('cacheInfo');
            cacheInfo.textContent = `Cache: ${info.bugCount} bugs, ${info.cacheSize}, ${info.lastSync}`;
        }

        // Show cache details
        function showCacheDetails() {
            if (!dataManager) return;
            
            const info = dataManager.getCacheInfo();
            alert(`Cache Information:\n\nBugs: ${info.bugCount}\nSize: ${info.cacheSize}\nLast Sync: ${info.lastSync}\nHas Filter State: ${info.hasFilterState ? 'Yes' : 'No'}`);
        }

        // Set up event listeners
        function setupEventListeners() {
            // Search filter
            document.getElementById('searchFilter').addEventListener('input', applyFilters);
            
            // Clear filters button
            document.getElementById('clearFiltersButton').addEventListener('click', clearAllFilters);
            
            // Table sorting
            document.querySelectorAll('th[data-column]').forEach(th => {
                th.addEventListener('click', () => {
                    const column = th.getAttribute('data-column');
                    if (currentSort.column === column) {
                        currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                    } else {
                        currentSort.column = column;
                        currentSort.direction = 'asc';
                    }
                    applySorting();
                    displayBugsTable();
                    saveFilterState(); // Save sort state
                });
            });
            
            // Modal
            document.getElementById('closeModalBtn').addEventListener('click', closeBugDetails);
            document.getElementById('bugModal').addEventListener('click', (e) => {
                if (e.target === document.getElementById('bugModal')) {
                    closeBugDetails();
                }
            });
            
            // Cache info
            document.getElementById('cacheInfo').addEventListener('click', showCacheDetails);
        }

        // Initialize app when DOM is ready
        document.addEventListener('DOMContentLoaded', initializeApp);
    </script>
</body>
</html>
